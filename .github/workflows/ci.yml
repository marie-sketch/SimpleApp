name: Python CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Test with Docker
      run: |
        # Cette étape lance 'pytest' (via ton Dockerfile)
        docker build -t melodieakacode/simple-app:latest .

    - name: Push to Docker Hub
      run: |
        # Si et seulement si les tests passent, on envoie l'image
        docker push melodieakacode/simple-app:latest